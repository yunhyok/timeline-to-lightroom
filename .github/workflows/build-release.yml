name: Build and release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m PyInstaller TimelineToLightroom.spec --noconfirm
      - shell: pwsh
        run: Compress-Archive -Path dist/TimelineToLightroom/* -DestinationPath dist/TimelineToLightroom-Portable-v0.1.0.zip
      - run: choco install innosetup --no-progress -y
      - shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\TimelineToLightroom.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: TimelineToLightroom-v0.1.0
          path: |
            dist/TimelineToLightroom-Portable-v0.1.0.zip
            installer/output/TimelineToLightroom-Setup-v0.1.0.exe
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TimelineToLightroom-Portable-v0.1.0.zip
            installer/output/TimelineToLightroom-Setup-v0.1.0.exe

