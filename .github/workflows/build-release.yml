name: Build and release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m PyInstaller TimelineToLightroom.spec --noconfirm
      - shell: pwsh
        run: |
          $env:TIMELINE_TO_LIGHTROOM_SMOKE_TEST = "1"
          $process = Start-Process -FilePath "dist/TimelineToLightroom/TimelineToLightroom.exe" -PassThru -Wait
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
      - shell: pwsh
        run: Compress-Archive -Path dist/TimelineToLightroom/* -DestinationPath dist/TimelineToLightroom-Portable-v0.1.1.zip
      - run: choco install innosetup --no-progress -y
      - shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\TimelineToLightroom.iss'
      - uses: actions/upload-artifact@v7
        with:
          name: TimelineToLightroom-v0.1.1
          path: |
            dist/TimelineToLightroom-Portable-v0.1.1.zip
            installer/output/TimelineToLightroom-Setup-v0.1.1.exe
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/TimelineToLightroom-Portable-v0.1.1.zip
            installer/output/TimelineToLightroom-Setup-v0.1.1.exe
